{%extends 'asdf/base.html'%}

{%block content%}
<h1>Home page</h1>
{%if user.is_authenticated%}

<h2>hello {{user.username}}</h2>

<form action="{%url 'logout'%}" method="post">
    {%csrf_token%}
    <button type="submit">Logout</button>
</form>

{%else%}
<a href="{%url 'login'%}">Login</a>
{%endif%}

{%endblock%}
